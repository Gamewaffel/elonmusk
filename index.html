<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Der Flug durch Elon Musks Vermögen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            /* Diese Höhe bestimmt, wie lang man scrollen muss (die Dauer der Kamerafahrt) */
            height: 15000px; 
        }

        /* Fixierter Container für die 3D-Ansicht */
        #scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            perspective: 800px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Die 3D-Welt, die auf uns zukommt */
        #world {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        /* Styling für die fliegenden Geldbündel */
        .money {
            position: absolute;
            width: 60px;
            height: 30px;
            background-color: #0f8535;
            border: 2px solid #16c04e;
            border-radius: 3px;
            opacity: 0.6;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
            color: #16c04e;
            background-image: repeating-linear-gradient(
                45deg,
                rgba(0,0,0,0.1) 0px,
                rgba(0,0,0,0.1) 2px,
                transparent 2px,
                transparent 4px
            );
        }

        /* Styling für die Text-Meilensteine */
        .milestone {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 800px;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .milestone h2 {
            font-size: 3rem;
            margin: 0;
            color: #16c04e;
            text-shadow: 0 0 10px #16c04e;
        }

        .milestone p {
            font-size: 1.5rem;
            color: #cccccc;
        }

        #ui {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #333;
            z-index: 100;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui">
        Scroll nach unten, um in den Reichtum zu fliegen ↓<br>
        <span id="progress" style="color: #16c04e; font-weight: bold;">0 %</span>
    </div>

    <div id="scene">
        <div id="world">
            </div>
    </div>

    <script>
        const world = document.getElementById('world');
        const progressText = document.getElementById('progress');
        const totalScrollHeight = document.body.scrollHeight - window.innerHeight;

        // Faktor, wie schnell sich die Z-Achse beim Scrollen bewegt
        const zSpeed = 3; 

        // Meilensteine definieren (z-Position im 3D-Raum)
        const milestones = [
            { z: -500, title: "$0", desc: "Du startest hier. Ein normaler Mensch." },
            { z: -2500, title: "$2.5 Millionen", desc: "Durchschnittliches Lebenseinkommen eines Akademikers." },
            { z: -6000, title: "$100 Millionen", desc: "Ein sehr erfolgreicher Hollywood-Star." },
            { z: -12000, title: "$1 Milliarde", desc: "Herzlichen Glückwunsch, du bist Milliardär!" },
            { z: -22000, title: "$44 Milliarden", desc: "Der Preis, den Elon Musk für Twitter/X bezahlt hat." },
            { z: -35000, title: "$250+ Milliarden", desc: "Elon Musks ungefähres Nettovermögen. Du hast das Ende erreicht." }
        ];

        // Meilensteine in die Welt einfügen
        milestones.forEach(ms => {
            const el = document.createElement('div');
            el.className = 'milestone';
            el.innerHTML = `<h2>${ms.title}</h2><p>${ms.desc}</p>`;
            // Positioniere sie tief im Raum
            el.style.transform = `translate(-50%, -50%) translateZ(${ms.z}px)`;
            world.appendChild(el);
        });

        // Generiere hunderte fliegende "Geld-Partikel" für den Tunnel-Effekt
        const particleCount = 800;
        for (let i = 0; i < particleCount; i++) {
            const money = document.createElement('div');
            money.className = 'money';
            money.innerText = "$";
            
            // Zufällige Verteilung im Raum (x, y) und in der Tiefe (z)
            const x = (Math.random() - 0.5) * 3000;
            const y = (Math.random() - 0.5) * 2000;
            const z = (Math.random() * -38000) - 500; // Verteilt bis hinter den letzten Meilenstein

            money.style.transform = `translate3d(${x}px, ${y}px, ${z}px) rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`;
            world.appendChild(money);
        }

        // Scroll-Event-Listener für die Kamerafahrt
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            
            // Berechne die Z-Verschiebung basierend auf dem Scrollen
            const zMove = scrollY * zSpeed;
            
            // Bewege die "Welt" auf den Bildschirm zu
            world.style.transform = `translateZ(${zMove}px)`;

            // Berechne den Fortschritt in Prozent für die Anzeige
            const percent = Math.min(100, Math.max(0, (scrollY / totalScrollHeight) * 100));
            progressText.innerText = percent.toFixed(1) + ' %';
        });
    </script>

</body>
</html>
