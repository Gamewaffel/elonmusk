<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Elon's Money Beam: London to Paris</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            height: 40000px; /* Extrem langer Scrollweg für die Reise */
        }

        #viewport {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            perspective: 1200px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #001f3f 0%, #000 100%);
        }

        /* Der endlose Stapel aus 100€ Scheinen */
        #money-beam {
            position: absolute;
            width: 80px; /* Breite des Stapels */
            height: 80px;
            background: #27ae60;
            box-shadow: 0 0 40px #2ecc71;
            transform-style: preserve-3d;
            /* Textur für die gestapelten Scheine */
            background-image: repeating-linear-gradient(
                90deg,
                #145a32 0px, #145a32 1px,
                #27ae60 1px, #27ae60 2px
            );
        }

        /* Landschaftselemente */
        .scenery {
            position: absolute;
            font-size: 100px;
            transform: translateZ(0);
        }

        #dashboard {
            position: fixed;
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.9);
            padding: 25px;
            border-radius: 10px;
            border-left: 5px solid #2ecc71;
            z-index: 100;
        }

        .stat { font-size: 1.2rem; margin-bottom: 5px; }
        .val { color: #2ecc71; font-weight: bold; font-family: monospace; }

        #progress-container {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 10px;
            background: #222;
        }
        #progress-bar {
            height: 100%; width: 0%; background: #2ecc71;
            box-shadow: 0 0 20px #2ecc71;
        }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="dashboard">
        <div class="stat">Distanz ab London: <span id="dist" class="val">0 km</span></div>
        <div class="stat">Wert des Stapels: <span id="money" class="val">0 €</span></div>
        <div class="stat">Ort: <span id="loc" class="val">London</span></div>
        <div style="margin-top:10px; font-size:0.8rem; color:#888;">
            Horizontaler Stapel aus 100€ Scheinen (0.1mm Dicke).
        </div>
    </div>

    <div id="viewport">
        <div id="money-beam"></div>
    </div>

    <script>
        const beam = document.getElementById('money-beam');
        const distText = document.getElementById('dist');
        const moneyText = document.getElementById('money');
        const locText = document.getElementById('loc');
        const progressBar = document.getElementById('progress-bar');

        // 1 km Stapel = 10.000.000 Scheine à 100€ = 1 Milliarde €
        const moneyPerKm = 1000000000;
        const totalDistanceKm = 344; // London nach Paris

        // Objekte in der Landschaft
        const features = [
            { d: 0, n: "London (Big Ben)", e: "🏛️" },
            { d: 50, n: "Englische Landschaft", e: "🌳" },
            { d: 110, n: "Ärmelkanal (Küste)", e: "🌊" },
            { d: 150, n: "Mitten im Meer", e: "🚢" },
            { d: 210, n: "Französische Küste", e: "🇫🇷" },
            { d: 235, n: "ELONS GELD ENDE", e: "🛑" },
            { d: 344, n: "Paris (Eiffelturm)", e: "🗼" }
        ];

        features.forEach(f => {
            const el = document.createElement('div');
            el.className = 'scenery';
            el.innerHTML = `<div style="font-size:15px; background:black; padding:2px;">${f.n}</div>${f.e}`;
            el.style.left = "50%";
            el.style.top = (Math.random() > 0.5 ? "20%" : "70%");
            // Wir nutzen Z für die Distanz in der Tiefe
            el.style.transform = `translate3d(${(Math.random()-0.5)*800}px, 0, ${-f.d * 100}px)`;
            document.getElementById('viewport').appendChild(el);
        });

        window.addEventListener('scroll', () => {
            const y = window.scrollY;
            const currentKm = (y / 40000) * totalDistanceKm;
            const currentMoney = currentKm * moneyPerKm;

            // Den Geldstrahl auf uns zu bewegen
            // Wir bewegen die gesamte Szene in Z-Richtung
            const zMove = currentKm * 100;
            beam.style.transform = `translateZ(${zMove}px) scaleX(1) scaleY(1)`;
            
            // Alle Landschaftsobjekte mitbewegen
            document.querySelectorAll('.scenery').forEach((s, index) => {
                const f = features[index] || {d: 0};
                const depth = (-f.d * 100) + zMove;
                s.style.transform = `translate3d(${(index%2==0?200:-200)}px, ${(index%3==0?100:-100)}px, ${depth}px)`;
                s.style.opacity = depth > 500 ? 0 : 1; // Ausblenden wenn vorbei
            });

            distText.innerText = currentKm.toFixed(2) + " km";
            moneyText.innerText = currentMoney.toLocaleString('de-DE') + " €";
            
            if(currentKm >= 235 && currentKm < 340) {
                locText.innerText = "Geld reicht nicht bis Paris!";
                locText.style.color = "red";
            } else if (currentKm >= 344) {
                locText.innerText = "Ziel: Paris erreicht";
            } else {
                locText.innerText = currentKm < 110 ? "England" : "Über dem Meer";
                locText.style.color = "#2ecc71";
            }

            progressBar.style.width = (currentKm / totalDistanceKm * 100) + "%";
        });
    </script>
</body>
</html>
