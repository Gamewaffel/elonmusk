<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Elon's 800 Mrd. Highway: London - Paris - Beyond</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #000;
            color: white;
            font-family: 'Arial Black', sans-serif;
            overflow-x: hidden;
            height: 60000px; /* Extrem langer Scrollweg */
        }

        /* Fixierter Hintergrund für echtes Leben */
        #bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out;
            z-index: -2;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.3);
            z-index: -1;
        }

        #viewport {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            perspective: 1500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Der massive 800km Balken */
        #money-beam {
            position: absolute;
            width: 120px;
            height: 80px;
            background: #27ae60;
            box-shadow: 0 0 50px rgba(46, 204, 113, 0.8);
            transform-style: preserve-3d;
            background-image: repeating-linear-gradient(
                90deg,
                #145a32 0px, #145a32 1px,
                #27ae60 1px, #27ae60 2px
            );
            border: 2px solid #ffffff33;
        }

        #dashboard {
            position: fixed;
            top: 30px; left: 30px;
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border-radius: 5px;
            border: 3px solid #2ecc71;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .stat { font-size: 1.4rem; margin-bottom: 10px; text-transform: uppercase; }
        .val { color: #2ecc71; font-weight: bold; font-family: 'Courier New', monospace; }

        #progress-container {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 15px;
            background: #111; z-index: 1000;
        }
        #progress-bar {
            height: 100%; width: 0%; background: #2ecc71;
            box-shadow: 0 0 30px #2ecc71;
        }

        .location-tag {
            position: fixed;
            top: 50%; right: 10%;
            font-size: 5rem;
            opacity: 0.1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="bg-container" style="background-image: url('https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=1920&q=80');"></div>
    <div id="overlay"></div>
    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="dashboard">
        <div class="stat">Distanz: <span id="dist" class="val">0 km</span></div>
        <div class="stat">Geld verfahren: <span id="money" class="val">0 €</span></div>
        <div class="stat">Ort: <span id="loc" class="val">London</span></div>
        <div style="margin-top:10px; color:#aaa; font-size:0.9rem;">
            800 Mrd. € Stapel (0.1mm pro Schein)
        </div>
    </div>

    <div id="viewport">
        <div id="money-beam"></div>
    </div>

    <div id="city-name" class="location-tag">LONDON</div>

    <script>
        const beam = document.getElementById('money-beam');
        const distText = document.getElementById('dist');
        const moneyText = document.getElementById('money');
        const locText = document.getElementById('loc');
        const cityName = document.getElementById('city-name');
        const progressBar = document.getElementById('progress-bar');
        const bg = document.getElementById('bg-container');

        // Konstanten
        const totalDistanceKm = 800; 
        const moneyPerKm = 1000000000; // 1 Mrd pro KM

        // Real Life Hintergründe
        const stages = [
            { km: 0, name: "London", img: "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=1920&q=80" },
            { km: 100, name: "Kent (Natur)", img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80" },
            { km: 150, name: "Ärmelkanal", img: "https://images.unsplash.com/photo-1505118380757-91f5f45d8de4?auto=format&fit=crop&w=1920&q=80" },
            { km: 250, name: "Nordfrankreich", img: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1920&q=80" },
            { km: 344, name: "Paris", img: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=1920&q=80" },
            { km: 600, name: "Alpen Vorland", img: "https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=1920&q=80" },
            { km: 800, name: "Das Ende vom Geld", img: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1920&q=80" }
        ];

        window.addEventListener('scroll', () => {
            const y = window.scrollY;
            const scrollPercent = y / (document.body.scrollHeight - window.innerHeight);
            const currentKm = scrollPercent * totalDistanceKm;
            const currentMoney = currentKm * moneyPerKm;

            // Strahl-Bewegung
            const zMove = currentKm * 150; 
            beam.style.transform = `translateZ(${zMove}px)`;

            // UI Update
            distText.innerText = currentKm.toFixed(2) + " km";
            moneyText.innerText = currentMoney.toLocaleString('de-DE') + " €";
            progressBar.style.width = (scrollPercent * 100) + "%";

            // Hintergrund & Ort wechseln
            let currentStage = stages[0];
            stages.forEach(s => {
                if(currentKm >= s.km) currentStage = s;
            });

            if(locText.innerText !== currentStage.name) {
                locText.innerText = currentStage.name;
                cityName.innerText = currentStage.name.toUpperCase();
                bg.style.backgroundImage = `url('${currentStage.img}')`;
            }
        });
    </script>
</body>
</html>
