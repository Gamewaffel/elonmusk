<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warp-Flug: Elon Musks Vermögen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Ein dunkler Space-Hintergrund mit leichtem Lila/Blau für mehr Tiefe */
            background: radial-gradient(circle at center, #0a001a 0%, #000000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            /* Extrem lang, damit der Weg zu den Milliarden weh tut */
            height: 40000px; 
        }

        #scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Standard-Perspektive */
            perspective: 600px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: perspective 0.2s ease-out; /* Für den Zoom-Out/Warp-Effekt */
        }

        #world {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        /* Glühende Geld/Daten-Partikel */
        .particle {
            position: absolute;
            background-color: #00ff66;
            box-shadow: 0 0 15px #00ff66, 0 0 30px #00ff66;
            border-radius: 50%;
            opacity: 0.8;
        }

        /* Die Text-Meilensteine */
        .milestone {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 900px;
            padding: 40px;
            background: rgba(10, 0, 26, 0.6);
            border: 1px solid rgba(0, 255, 102, 0.3);
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 255, 102, 0.1);
            backdrop-filter: blur(5px);
        }

        .milestone h2 {
            font-size: 4rem;
            margin: 0 0 10px 0;
            color: #00ff66;
            text-shadow: 0 0 20px #00ff66, 0 0 40px #00ff66;
            letter-spacing: 2px;
        }

        .milestone p {
            font-size: 1.8rem;
            color: #e0e0e0;
            margin: 0;
            line-height: 1.4;
        }

        #ui {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 30px;
            border: 1px solid #00ff66;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
            z-index: 100;
            text-align: center;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="ui">
        Warp-Antrieb aktiv: Scrollen ↓<br>
        <span id="progress" style="color: #00ff66; font-weight: bold; font-size: 1.5rem;">0 %</span>
    </div>

    <div id="scene">
        <div id="world"></div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const world = document.getElementById('world');
        const progressText = document.getElementById('progress');
        const totalScrollHeight = document.body.scrollHeight - window.innerHeight;

        // Der Multiplikator für die Z-Achse. Wir machen es schnell!
        const zSpeed = 4; 

        // Die neuen Meilensteine mit extremen Z-Distanzen
        // Um das Verhältnis zu zeigen, sind die Lücken am Ende gigantisch.
        const milestones = [
            { z: -500, title: "$0", desc: "Startpunkt. Hier stehen die meisten von uns am Anfang." },
            { z: -1500, title: "~ $50.000", desc: "Durchschnittliches Jahreseinkommen in Deutschland (ca. 45.000 €)." },
            { z: -4000, title: "$2.5 Millionen", desc: "Das Lebensarbeitseinkommen eines durchschnittlichen Akademikers." },
            { z: -10000, title: "$100 Millionen", desc: "Ein weltberühmter Hollywood-Star oder Top-Fußballer." },
            { z: -25000, title: "$1 Milliarde", desc: "Willkommen im Komma-Club. Ein Einhorn-Startup." },
            { z: -45000, title: "$10 Milliarden", desc: "Die Baukosten des James-Webb-Weltraumteleskops." },
            { z: -75000, title: "$44 Milliarden", desc: "Der Kaufpreis für Twitter (X)." },
            { z: -110000, title: "$100 Milliarden", desc: "Das Bruttoinlandsprodukt (BIP) vieler kleinerer Staaten." },
            { z: -150000, title: "$250+ Milliarden", desc: "Elon Musk. Der Wahnsinn hat ein Ende. Glückwunsch zum Muskelkater im Finger." }
        ];

        // Meilensteine in die Welt rendern
        milestones.forEach(ms => {
            const el = document.createElement('div');
            el.className = 'milestone';
            el.innerHTML = `<h2>${ms.title}</h2><p>${ms.desc}</p>`;
            el.style.transform = `translate(-50%, -50%) translateZ(${ms.z}px)`;
            world.appendChild(el);
        });

        // 1500 leuchtende Partikel für den Hyperdrive-Effekt
        const particleCount = 1500;
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            // Variierende Größen für Tiefe
            const size = Math.random() * 4 + 1;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            // X und Y extrem weit gestreut für den weiten Raum
            const x = (Math.random() - 0.5) * 6000;
            const y = (Math.random() - 0.5) * 4000;
            // Z über die gesamte Länge der Strecke verteilt (bis weit hinter Elon Musk)
            const z = (Math.random() * -160000); 

            particle.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
            world.appendChild(particle);
        }

        // Variablen für den Zoom-Out-Effekt beim schnellen Scrollen
        let lastScrollY = window.scrollY;
        let scrollTimeout;

        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;
            
            // Geschwindigkeit berechnen
            const speed = Math.abs(currentScrollY - lastScrollY);
            lastScrollY = currentScrollY;

            // Kamerafahrt (Z-Verschiebung)
            const zMove = currentScrollY * zSpeed;
            world.style.transform = `translateZ(${zMove}px)`;

            // Dynamischer Zoom-Out (Perspektive ändert sich je nach Scroll-Geschwindigkeit)
            // Basis ist 600px. Je schneller, desto extremer der Winkel.
            const newPerspective = 600 + (speed * 5); 
            scene.style.perspective = `${Math.min(newPerspective, 1500)}px`;

            // Perspektive wieder normalisieren, wenn man aufhört zu scrollen
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                scene.style.perspective = '600px';
            }, 100);

            // Fortschrittsbalken aktualisieren
            const percent = Math.min(100, Math.max(0, (currentScrollY / totalScrollHeight) * 100));
            progressText.innerText = percent.toFixed(1) + ' %';
        });
    </script>
</body>
</html>
